# Встроенные планы покупки. Источник правды: правка этого файла доезжает и до тех,
# у кого уже есть сохранённые данные — встроенные планы не хранятся в localStorage.
#
# Эти планы нельзя изменить или удалить из интерфейса. Свои планы создаются во
# вкладке «Планы» и лежат в localStorage рядом с остальными исходными данными.
#
# Каждый план — пять решений:
#   loan     halyk | otbasy | none   — какой кредит (none = без ипотеки)
#   buyWhen  asap | after-months | otbasy-gates — когда покупать
#   saveMonths  число месяцев для after-months; null = «ждать как Otbasy»
#   borrow   max | min   — занять максимум (меньший взнос) или минимум (всё вниз)
#   repay    monthly | lump — гасить каждый месяц или копить и закрыть одним платежом
#   housing  где вы живёте до покупки и что продаёте — свой план для каждого:
#     situation        selling | free | renting
#     saleProceeds     сумма продажи сегодня (читается только при selling)
#     saleMonthOffset  месяц продажи (читается только при selling)
#
# borrow/repay не читаются при loan: none — заполнены для формы. Подробнее — MODEL.md.

- id: halyk
  name: Halyk
  loan: halyk
  buyWhen: asap
  saveMonths: null
  borrow: max
  repay: monthly
  housing:
    situation: selling
    saleProceeds: 35000000
    saleMonthOffset: 3

- id: otbasy
  name: Otbasy
  loan: otbasy
  buyWhen: otbasy-gates
  saveMonths: null
  borrow: max
  repay: lump
  housing:
    situation: selling
    saleProceeds: 35000000
    saleMonthOffset: 3

- id: all-cash
  name: Без ипотеки
  loan: none
  buyWhen: asap
  saveMonths: null
  borrow: max
  repay: monthly
  housing:
    situation: selling
    saleProceeds: 35000000
    saleMonthOffset: 3
