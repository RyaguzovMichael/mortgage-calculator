# Встроенные планы покупки. Источник правды: правка этого файла доезжает и до тех,
# у кого уже есть сохранённые данные — встроенные планы не хранятся в localStorage.
#
# Эти планы нельзя изменить или удалить из интерфейса. Свои планы создаются во
# вкладке «Планы» и лежат в localStorage рядом с остальными исходными данными.
#
# Каждый план — набор решений:
#   loan     halyk | otbasy | none   — какой кредит (none = без ипотеки)
#   buyWhen  asap | after-months | otbasy-gates — когда покупать
#   saveMonths  число месяцев для after-months; null = «ждать как Otbasy»
#   borrow   max | min   — занять максимум (меньший взнос) или минимум (всё вниз)
#   repay    monthly | lump | never — гасить каждый месяц, копить и закрыть одним
#            платежом, или никогда не гасить досрочно (кредит идёт весь срок, а
#            излишек всё это время работает во вкладе)
#   situation  selling | free | renting — где вы живёте до покупки. selling также
#            требует, чтобы в стартовых условиях была квартира на продажу
#            (Inputs.existingApartment); free/renting требуют её отсутствия. Сумма
#            продажи — стартовое условие, а не поле плана.
#   saleMonthOffset  месяц продажи существующей квартиры (для selling; free/renting
#            игнорируют). Решение плана — разные планы могут продавать в разные месяцы.
#   savingsProductId  id вклада из каталога (data/deposits.yml или свой), куда план
#            складывает деньги. В варианте Otbasy не используется — деньги идут на
#            счёт Отбасы.
#
# borrow/repay не читаются при loan: none — заполнены для формы. Подробнее — MODEL.md.

- id: halyk
  name: Halyk
  loan: halyk
  buyWhen: asap
  saveMonths: null
  borrow: max
  repay: monthly
  situation: selling
  saleMonthOffset: 3
  savingsProductId: kaspi-deposit

- id: otbasy
  name: Otbasy
  loan: otbasy
  buyWhen: otbasy-gates
  saveMonths: null
  borrow: max
  repay: lump
  situation: selling
  saleMonthOffset: 3
  savingsProductId: kaspi-deposit

- id: otbasy-hold
  name: Otbasy (не гасить)
  loan: otbasy
  buyWhen: otbasy-gates
  saveMonths: null
  borrow: max
  repay: never
  situation: selling
  saleMonthOffset: 3
  savingsProductId: kaspi-deposit

- id: all-cash
  name: Без ипотеки
  loan: none
  buyWhen: asap
  saveMonths: null
  borrow: max
  repay: monthly
  situation: selling
  saleMonthOffset: 3
  savingsProductId: kaspi-deposit
