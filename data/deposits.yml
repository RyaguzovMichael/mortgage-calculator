# Встроенные вклады. Источник правды: правка этого файла доезжает и до тех, у кого
# уже есть сохранённые данные — встроенные вклады не хранятся в localStorage.
#
# Эти вклады нельзя изменить или удалить из интерфейса. Свои вклады создаются во
# вкладке «Вклады» и лежат в localStorage рядом с остальными исходными данными.
#
# payoutPeriodMonths — через сколько месяцев банк выплачивает проценты. Это не
# косметика: до выплаты проценты не входят в баланс, а любое снятие сжигает весь
# накопленный период. Поэтому 1 означает «снял когда угодно, ничего не потерял», и
# поэтому 14,1% с ежемесячной выплатой обыгрывают 18,4% раз в полгода, если с
# вклада приходится снимать каждый месяц. Подробнее — MODEL.md.

- id: kaspi-deposit
  name: Kaspi Депозит
  annualRate: 0.184
  payoutPeriodMonths: 6

- id: kaspi-savings
  name: Kaspi Копилка
  annualRate: 0.141
  payoutPeriodMonths: 1
