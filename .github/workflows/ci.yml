name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm i

      - name: Lint
        run: |
          pnpm exec oxlint .
          pnpm exec eslint .

      - name: Test
        run: pnpm exec vitest --run

      - name: Type check & build
        run: pnpm run build
